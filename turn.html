<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>正在開啟 NotebookLM 資料</title>
    <meta name="robots" content="noindex">
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7fafb;
        color: #12212a;
        font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      }

      main {
        width: min(92vw, 760px);
        text-align: center;
        padding: 48px 24px;
      }

      h1 {
        margin: 0;
        color: #1f4e5f;
        font-size: 36px;
        line-height: 1.25;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 24px 0 0;
        color: #58717b;
        font-size: 18px;
        line-height: 1.6;
      }

      a {
        color: #1f4e5f;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在開啟 NotebookLM 資料...</h1>
      <p>
        如果沒有自動跳轉，請
        <a id="manual-link" href="https://notebooklm.google.com/notebook/db3289c7-655b-4313-9309-1d1bf185ae34">點這裡</a>
      </p>
    </main>

    <script>
      const NOTEBOOK_URL = "https://notebooklm.google.com/notebook/db3289c7-655b-4313-9309-1d1bf185ae34";
      const LOG_URL = "https://script.google.com/macros/s/AKfycbzcjnIw0hIcxO0QJx9foneo4-gvOpbjJHN-1TRjr86vGDuGRb1dAmQxI5VXRBM6A27j/exec";
      const REDIRECT_DELAY_MS = 100;

      document.getElementById("manual-link").href = NOTEBOOK_URL;

      try {
        fetch(LOG_URL, {
          method: "GET",
          mode: "no-cors",
          cache: "no-store",
          keepalive: true
        }).catch(() => {});
      } catch (error) {
        // Do not block the redirect if click tracking fails.
      }

      window.setTimeout(() => {
        window.location.replace(NOTEBOOK_URL);
      }, REDIRECT_DELAY_MS);
    </script>
  </body>
</html>
