<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勞務報酬單產生器</title>
    <!-- 引入將網頁轉圖片的工具 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入將圖片轉 PDF 的工具 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ====== 這是 CSS (負責外觀) ====== */
        body {
            font-family: "微軟正黑體", sans-serif;
            background-color: #f3f4f6;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        /* 左邊表單區 */
        .form-section {
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        /* 右邊 A4 預覽區 */
        .preview-section {
            flex-grow: 1;
            overflow-x: auto;
        }

        /* 模擬 A4 紙張大小 */
        #a4-paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 20mm;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin: 0 auto;
        }

        .document-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .document-row {
            display: flex;
            margin-bottom: 20px;
            font-size: 16px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .document-label {
            width: 120px;
            font-weight: bold;
        }

        .document-value {
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <!-- ====== 這是 HTML (負責骨架與內容) ====== -->

    <!-- 左側：輸入表單 -->
    <div class="form-section">
        <h2>填寫資料</h2>
        
        <div class="form-group">
            <label>專案名稱</label>
            <input type="text" id="in-project" placeholder="例如：網站開發設計" oninput="updatePreview()">
        </div>
        
        <div class="form-group">
            <label>公司名稱</label>
            <input type="text" id="in-company" placeholder="例如：某某科技有限公司" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label>公司聯絡人</label>
            <input type="text" id="in-contact" placeholder="例如：王小明" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label>服務內容</label>
            <input type="text" id="in-service" placeholder="例如：首頁設計與切版" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label>總金額 (NT$)</label>
            <input type="number" id="in-amount" placeholder="例如：50000" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label>所得類別</label>
            <select id="in-category" onchange="updatePreview()">
                <option value="9A 執行業務所得">9A 執行業務所得</option>
                <option value="50 薪資所得">50 薪資所得</option>
            </select>
        </div>

        <button onclick="downloadPDF()">⬇️ 下載 PDF</button>
    </div>

    <!-- 右側：A4 預覽畫面 (準備變成 PDF 的地方) -->
    <div class="preview-section">
        <div id="a4-paper">
            <div class="document-title">勞 務 報 酬 單</div>
            
            <div class="document-row">
                <div class="document-label">專案名稱：</div>
                <div class="document-value" id="out-project">（尚未填寫）</div>
            </div>
            
            <div class="document-row">
                <div class="document-label">公司名稱：</div>
                <div class="document-value" id="out-company">（尚未填寫）</div>
            </div>

            <div class="document-row">
                <div class="document-label">公司聯絡人：</div>
                <div class="document-value" id="out-contact">（尚未填寫）</div>
            </div>

            <div class="document-row">
                <div class="document-label">服務內容：</div>
                <div class="document-value" id="out-service">（尚未填寫）</div>
            </div>

            <div class="document-row">
                <div class="document-label">總金額：</div>
                <div class="document-value" id="out-amount">NT$ 0</div>
            </div>

            <div class="document-row">
                <div class="document-label">所得類別：</div>
                <div class="document-value" id="out-category">9A 執行業務所得</div>
            </div>
            
            <br><br><br>
            <div style="text-align: right; margin-top: 50px;">
                <p>領款人簽章：__________________</p>
                <p>日期：_____年_____月_____日</p>
            </div>
        </div>
    </div>

    <!-- ====== 這是 JavaScript (負責邏輯與功能) ====== -->
    <script>
        // 功能 1：當左邊打字時，右邊即時更新
        function updatePreview() {
            // 抓取左邊輸入框的值，放進右邊的文字裡
            document.getElementById('out-project').innerText = document.getElementById('in-project').value || "（尚未填寫）";
            document.getElementById('out-company').innerText = document.getElementById('in-company').value || "（尚未填寫）";
            document.getElementById('out-contact').innerText = document.getElementById('in-contact').value || "（尚未填寫）";
            document.getElementById('out-service').innerText = document.getElementById('in-service').value || "（尚未填寫）";
            document.getElementById('out-amount').innerText = "NT$ " + (document.getElementById('in-amount').value || "0");
            document.getElementById('out-category').innerText = document.getElementById('in-category').value;
        }

        // 功能 2：將右邊的 A4 畫面轉成 PDF 下載
        function downloadPDF() {
            // 改變按鈕文字，讓使用者知道正在處理
            const btn = document.querySelector('button');
            btn.innerText = "⏳ 產生中...";
            btn.disabled = true;

            // 抓取那張 A4 紙的元素
            const element = document.getElementById('a4-paper');

            // 使用 html2canvas 拍照 (scale: 2 可以讓字體更清晰)
            html2canvas(element, { scale: 2 }).then(canvas => {
                // 將圖片轉為資料
                const imgData = canvas.toDataURL('image/png');
                
                // 叫出 jsPDF (設定為 A4 尺寸)
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                // 計算圖片放入 PDF 的比例
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                
                // 把圖片貼上 PDF
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                
                // 下載檔案
                pdf.save('勞務報酬單.pdf');

                // 恢復按鈕狀態
                btn.innerText = "⬇️ 下載 PDF";
                btn.disabled = false;
            });
        }
    </script>

</body>
</html>
