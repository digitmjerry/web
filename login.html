<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數字廣告外部帳號盤點登錄系統</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #eef3f7;
      --surface: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d6dee8;
      --primary: #1463ff;
      --primary-dark: #0f4ed0;
      --danger: #b42318;
      --danger-bg: #fff0ee;
      --ok-bg: #ecfdf3;
      --ok: #027a48;
      --shadow: 0 18px 50px rgba(16, 24, 40, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--text);
      background:
        linear-gradient(120deg, rgba(20, 99, 255, 0.10), rgba(0, 124, 137, 0.08)),
        var(--bg);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .login-shell {
      width: min(100%, 960px);
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      background: var(--surface);
      border: 1px solid rgba(214, 222, 232, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .intro {
      padding: 48px;
      background:
        linear-gradient(135deg, rgba(20, 99, 255, 0.12), rgba(2, 122, 72, 0.10)),
        #f7fafc;
      border-right: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      color: #0f4ed0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .mark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #12b76a;
      box-shadow: 0 0 0 5px rgba(18, 183, 106, 0.14);
    }

    h1 {
      margin: 0;
      max-width: 560px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .lead {
      max-width: 560px;
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .rules {
      display: grid;
      gap: 12px;
      margin-top: 36px;
    }

    .rule {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: #344054;
      font-size: 14px;
      line-height: 1.6;
    }

    .rule-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      margin-top: 8px;
      border-radius: 50%;
      background: var(--primary);
    }

    .panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 44px;
    }

    .panel h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .panel p {
      margin: 10px 0 26px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    #google-button {
      min-height: 44px;
    }

    .preview-button,
    .plain-button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 13px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .preview-button {
      margin-top: 12px;
      color: #fff;
      background: var(--primary);
    }

    .preview-button:hover {
      background: var(--primary-dark);
    }

    .plain-button {
      margin-top: 10px;
      color: #344054;
      background: #f2f4f7;
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.6;
    }

    .status.error {
      display: block;
      color: var(--danger);
      background: var(--danger-bg);
      border: 1px solid #fecdca;
    }

    .status.ok {
      display: block;
      color: var(--ok);
      background: var(--ok-bg);
      border: 1px solid #abefc6;
    }

    .note {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #344054;
    }

    @media (max-width: 820px) {
      .login-shell {
        grid-template-columns: 1fr;
      }

      .intro {
        padding: 34px 24px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .panel {
        padding: 30px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="login-shell" aria-label="登入">
      <div class="intro">
        <div class="eyebrow"><span class="mark"></span>內部盤點登錄</div>
        <h1>數字廣告外部帳號盤點登錄系統</h1>
        <p class="lead">
          登錄外部平台帳號、實際用途、保管人、登入方式與安全設定，協助集中盤點公司公務帳號。
        </p>
        <div class="rules" aria-label="填寫原則">
          <div class="rule"><span class="rule-dot"></span><span>僅允許 <strong>@digitm.com.tw</strong> 的 Google 帳號登入與送出。</span></div>
          <div class="rule"><span class="rule-dot"></span><span>每次送出一個外部登入帳號；同一帳號可勾選多個使用平台。</span></div>
          <div class="rule"><span class="rule-dot"></span><span>手機號碼與驗證狀態屬於敏感資料，請依實際狀態填寫。</span></div>
        </div>
      </div>

      <div class="panel">
        <h2>使用 Google 帳號登入</h2>
        <p>登入後即可填寫盤點資料。系統會自動記錄填表者姓名與 email。</p>

        <div id="google-button"></div>
        <button class="preview-button" id="preview-login" type="button">原型預覽登入</button>
        <button class="plain-button" id="clear-session" type="button">清除本機登入狀態</button>

        <div class="status" id="status" role="status"></div>

        <div class="note">
          正式上線前，請將程式中的 <code>GOOGLE_CLIENT_ID</code> 換成 Google Cloud Console 的 OAuth Client ID。
          原型預覽登入只用於畫面測試。
        </div>
      </div>
    </section>
  </main>

  <script>
    const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";
    const ALLOWED_DOMAIN = "digitm.com.tw";
    const FORM_PAGE = "form.html";

    const statusEl = document.getElementById("status");
    const previewLoginButton = document.getElementById("preview-login");
    const clearSessionButton = document.getElementById("clear-session");

    function setStatus(type, message) {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    }

    function decodeJwt(token) {
      const payload = token.split(".")[1];
      const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
      const json = decodeURIComponent(
        atob(normalized)
          .split("")
          .map((char) => `%${(`00${char.charCodeAt(0).toString(16)}`).slice(-2)}`)
          .join("")
      );
      return JSON.parse(json);
    }

    function isAllowedEmail(email) {
      return typeof email === "string" && email.toLowerCase().endsWith(`@${ALLOWED_DOMAIN}`);
    }

    function saveUserAndContinue(profile) {
      if (!isAllowedEmail(profile.email)) {
        setStatus("error", `此系統僅允許 @${ALLOWED_DOMAIN} 帳號登入。`);
        localStorage.removeItem("inventoryUser");
        return;
      }

      localStorage.setItem("inventoryUser", JSON.stringify({
        name: profile.name || profile.email,
        email: profile.email,
        picture: profile.picture || "",
        loginAt: new Date().toISOString()
      }));

      setStatus("ok", "登入成功，正在前往填寫頁。");
      window.location.href = FORM_PAGE;
    }

    function handleCredentialResponse(response) {
      try {
        saveUserAndContinue(decodeJwt(response.credential));
      } catch (error) {
        console.error(error);
        setStatus("error", "Google 登入資料解析失敗，請重新登入。");
      }
    }

    window.onload = function () {
      if (GOOGLE_CLIENT_ID.includes("YOUR_GOOGLE_CLIENT_ID")) {
        setStatus("error", "尚未設定 Google OAuth Client ID，目前可使用原型預覽登入。");
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse
      });

      google.accounts.id.renderButton(
        document.getElementById("google-button"),
        { theme: "outline", size: "large", width: 320, text: "signin_with" }
      );
    };

    previewLoginButton.addEventListener("click", () => {
      saveUserAndContinue({
        name: "原型預覽使用者",
        email: `preview@${ALLOWED_DOMAIN}`,
        picture: ""
      });
    });

    clearSessionButton.addEventListener("click", () => {
      localStorage.removeItem("inventoryUser");
      setStatus("ok", "已清除本機登入狀態。");
    });
  </script>
</body>
</html>
