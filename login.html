<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數字廣告外部帳號盤點登錄系統</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
      --surface: rgba(255, 255, 255, 0.78);
      --text-main: #1e293b;
      --text-heading: #0f172a;
      --text-muted: #475569;
      --line: rgba(186, 230, 253, 0.4);
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --danger: #b42318;
      --danger-bg: #fff5f5;
      --ok: #15803d;
      --ok-bg: #f0fdf4;
      --shadow: 0 25px 50px -12px rgba(14, 116, 144, 0.15);
      --glass-border: 1px solid rgba(255, 255, 255, 0.6);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--text-main);
      background: var(--bg-gradient);
      overflow-x: hidden;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.65;
      z-index: -1;
      pointer-events: none;
    }

    .bg-glow-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.45) 0%, rgba(14, 165, 233, 0.05) 70%);
      top: -10%;
      left: -5%;
      animation: float-bg 25s ease-in-out infinite alternate;
    }

    .bg-glow-2 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.35) 0%, rgba(6, 182, 212, 0.05) 70%);
      bottom: -15%;
      right: -5%;
      animation: float-bg 30s ease-in-out infinite alternate-reverse;
    }

    .bg-glow-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(125, 211, 252, 0.3) 0%, rgba(2, 132, 199, 0.02) 70%);
      top: 40%;
      left: 45%;
      animation: float-bg 20s ease-in-out infinite alternate;
    }

    @keyframes float-bg {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -60px) scale(1.05); }
      100% { transform: translate(-20px, 40px) scale(0.95); }
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .login-shell {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      background: var(--surface);
      border: var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      animation: card-appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-shell:hover {
      box-shadow: 0 35px 60px -15px rgba(14, 116, 144, 0.22);
    }

    @keyframes card-appear {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .intro {
      padding: 56px;
      background: linear-gradient(135deg, rgba(224, 242, 254, 0.55) 0%, rgba(186, 230, 253, 0.25) 100%);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      color: #0369a1;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: rgba(224, 242, 254, 0.8);
      padding: 6px 14px;
      border-radius: 50px;
      border: 1px solid rgba(186, 230, 253, 0.5);
      align-self: flex-start;
    }

    .mark {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0ea5e9;
      position: relative;
    }

    .mark::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0ea5e9;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(2.5);
        opacity: 0;
      }
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 3.5vw, 36px);
      line-height: 1.3;
      font-weight: 900;
      color: var(--text-heading);
      background: linear-gradient(135deg, #0369a1 0%, #0c4a6e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .lead {
      margin: 18px 0 0;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .visual-accent {
      margin: 32px auto;
      width: 180px;
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .spin-slow {
      animation: spin-slow 25s linear infinite;
    }

    .float-slow {
      animation: float-slow 4s ease-in-out infinite;
    }

    @keyframes spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes float-slow {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .rules {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }

    .rule {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: #334155;
      font-size: 14px;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.45);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .rule:hover {
      background: rgba(255, 255, 255, 0.7);
      transform: translateX(4px);
    }

    .rule-dot {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0284c7;
    }

    .panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px;
      background: rgba(255, 255, 255, 0.35);
    }

    .panel h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      color: var(--text-heading);
    }

    .panel p {
      margin: 12px 0 32px;
      color: var(--text-muted);
      line-height: 1.65;
      font-size: 14.5px;
    }

    #google-button {
      min-height: 48px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.2s ease;
      margin-bottom: 12px;
    }

    #google-button:hover {
      transform: translateY(-2px);
    }

    .plain-button {
      width: 100%;
      border: 1px solid rgba(14, 165, 233, 0.35);
      border-radius: 10px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      color: #0369a1;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(5px);
      transition: all 0.25s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .plain-button:hover {
      color: #0284c7;
      border-color: #0284c7;
      background: rgba(224, 242, 254, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.08);
    }

    .plain-button:active {
      transform: translateY(0);
      background: rgba(224, 242, 254, 0.6);
    }

    .status {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 500;
      animation: slide-up-fade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slide-up-fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status.error {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #991b1b;
      background: var(--danger-bg);
      border: 1px solid #fecaca;
    }

    .status.ok {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ok);
      background: var(--ok-bg);
      border: 1px solid #bbf7d0;
    }

    .note {
      margin-top: 32px;
      padding: 16px;
      background: rgba(224, 242, 254, 0.45);
      border: 1px solid rgba(186, 230, 253, 0.5);
      border-radius: 12px;
      color: #0369a1;
      font-size: 13px;
      line-height: 1.65;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .note code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #0284c7;
      background: rgba(255, 255, 255, 0.8);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
    }

    @media (max-width: 860px) {
      .login-shell {
        grid-template-columns: 1fr;
        max-width: 500px;
        margin: 0 auto;
      }

      .intro {
        padding: 40px 32px;
        border-right: 0;
        border-bottom: 1px solid rgba(186, 230, 253, 0.4);
      }

      .panel {
        padding: 40px 32px;
      }

      .visual-accent {
        margin: 16px auto;
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <main class="page">
    <section class="login-shell" aria-label="登入">
      <div class="intro">
        <div>
          <div class="eyebrow"><span class="mark"></span>帳號盤點登錄</div>
          <h1>數字廣告外部帳號盤點登錄系統</h1>
          <p class="lead">
            登錄外部平台帳號、實際用途、保管人、登入方式與安全設定，協助集中盤點公司公務帳號。
          </p>
        </div>

        <div class="visual-accent">
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Background circles -->
            <circle cx="100" cy="100" r="80" stroke="url(#grid-grad)" stroke-width="1" stroke-dasharray="4 4" />
            <circle cx="100" cy="100" r="55" stroke="url(#grid-grad)" stroke-width="1.5" />
            <!-- Decorative rotating gear/nodes -->
            <g class="spin-slow" style="transform-origin: 100px 100px;">
              <circle cx="100" cy="20" r="6" fill="#00e5ff" />
              <circle cx="180" cy="100" r="4" fill="#00b0ff" />
              <circle cx="100" cy="180" r="5" fill="#2979ff" />
              <circle cx="20" cy="100" r="3.5" fill="#00e5ff" />
            </g>
            <!-- Central secure shield and key -->
            <g class="float-slow" style="transform-origin: 100px 100px;">
              <path d="M100 45C115 45 135 40 140 50C145 60 145 90 140 110C132.8 138.8 100 155 100 155C100 155 67.2 138.8 60 110C55 90 55 60 60 50C65 40 85 45 100 45Z" fill="url(#shield-grad)" filter="url(#drop-shadow)" />
              <circle cx="100" cy="95" r="10" fill="#ffffff" />
              <path d="M96 95L104 95L102 115L98 115Z" fill="#ffffff" />
            </g>
            <defs>
              <linearGradient id="grid-grad" x1="0" y1="0" x2="200" y2="200">
                <stop offset="0%" stop-color="rgba(14, 165, 233, 0.4)" />
                <stop offset="100%" stop-color="rgba(6, 182, 212, 0.05)" />
              </linearGradient>
              <linearGradient id="shield-grad" x1="60" y1="45" x2="140" y2="155">
                <stop offset="0%" stop-color="#0ea5e9" />
                <stop offset="50%" stop-color="#0284c7" />
                <stop offset="100%" stop-color="#0369a1" />
              </linearGradient>
              <filter id="drop-shadow" x="40" y="30" width="120" height="140" filterUnits="userSpaceOnUse">
                <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0ea5e9" flood-opacity="0.3" />
              </filter>
            </defs>
          </svg>
        </div>

        <div class="rules" aria-label="填寫原則">
          <div class="rule">
            <span class="rule-dot">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span>僅允許 <strong>@digitm.com.tw</strong> 的 Google 帳號登入與送出。</span>
          </div>
          <div class="rule">
            <span class="rule-dot">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span>每次送出一個外部登入帳號；同一帳號可勾選多個使用平台。</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>使用 Google 帳號登入</h2>
        <p>登入後即可填寫盤點資料。系統會自動記錄填表者姓名與 email。</p>

        <div id="google-button"></div>
        
        <button class="plain-button" id="clear-session" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          清除本機登入狀態
        </button>

        <div class="status" id="status" role="status"></div>

        <div class="note">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; color: #0284c7; margin-top: 1.5px;">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <div>
            登入限使用 <code>數字廣告</code> 的 Google 帳號。若無法登入，請確認帳號網域與瀏覽器權限設定。
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const GOOGLE_CLIENT_ID = "328635489632-isk6cs317ia9nop4v6nms5t3jeblbs4l.apps.googleusercontent.com";
    const ALLOWED_DOMAIN = "digitm.com.tw";
    const FORM_PAGE = "form.html";

    const statusEl = document.getElementById("status");
    const clearSessionButton = document.getElementById("clear-session");

    function setStatus(type, message) {
      statusEl.className = `status ${type}`;
      let iconSvg = '';
      if (type === 'error') {
        iconSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
      } else if (type === 'ok') {
        iconSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
      }
      statusEl.innerHTML = `${iconSvg}<span>${message}</span>`;
    }

    function decodeJwt(token) {
      const payload = token.split(".")[1];
      const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
      const json = decodeURIComponent(
        atob(normalized)
          .split("")
          .map((char) => `%${(`00${char.charCodeAt(0).toString(16)}`).slice(-2)}`)
          .join("")
      );
      return JSON.parse(json);
    }

    function isAllowedEmail(email) {
      return typeof email === "string" && email.toLowerCase().endsWith(`@${ALLOWED_DOMAIN}`);
    }

    function saveUserAndContinue(profile) {
      if (!isAllowedEmail(profile.email)) {
        setStatus("error", `此系統僅允許 @${ALLOWED_DOMAIN} 帳號登入。`);
        localStorage.removeItem("inventoryUser");
        return;
      }

      localStorage.setItem("inventoryUser", JSON.stringify({
        name: profile.name || profile.email,
        email: profile.email,
        picture: profile.picture || "",
        loginAt: new Date().toISOString()
      }));

      setStatus("ok", "登入成功，正在前往填寫頁。");
      window.location.href = FORM_PAGE;
    }

    function handleCredentialResponse(response) {
      try {
        saveUserAndContinue(decodeJwt(response.credential));
      } catch (error) {
        console.error(error);
        setStatus("error", "Google 登入資料解析失敗，請重新登入。");
      }
    }

    window.onload = function () {
      if (GOOGLE_CLIENT_ID.includes("YOUR_GOOGLE_CLIENT_ID")) {
        setStatus("error", "尚未設定 Google OAuth Client ID，請先完成登入設定。");
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse
      });

      google.accounts.id.renderButton(
        document.getElementById("google-button"),
        { theme: "outline", size: "large", width: 320, text: "signin_with" }
      );
    };

    clearSessionButton.addEventListener("click", () => {
      localStorage.removeItem("inventoryUser");
      setStatus("ok", "已清除本機登入狀態。");
    });
  </script>
</body>
</html>
