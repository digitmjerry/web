<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>食物轉盤</title>
<style>
    body {font-family: sans-serif; text-align: center; margin-top: 30px;}
    canvas {border: 2px solid #333; background: #fafafa; display: inline-block;}
    button {margin: 10px; padding: 10px 20px; font-size: 1em; cursor: pointer;}
    #result {margin-top: 20px; font-size: 1.5em; color: #2c3e50; min-height: 2em;}
    #status {margin-top: 10px; font-size: 0.9em; color: #555;}
</style>
</head>
<body>
<h1>轉盤選餐</h1>
<canvas id="wheel" width="500" height="500"></canvas>
<button id="spinBtn">轉一下！</button>
<div id="status">載入中...</div>
<div id="result"></div>

<script>
let items = []; // will be filled after fetch

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const diameter = canvas.width;
const radius = diameter / 2;
const centerX = radius;
const centerY = radius;
let numSlices = 0;
let sliceAngle = 0;
let spinAngleStart = 0;
let spinTime = 0;
let spinTimeTotal = 0;
let startAngle = 0;

// Attempt to load CSV from same directory
async function loadCSV() {
    const statusEl = document.getElementById('status');
    try {
        const resp = await fetch('./food.csv', {cache: 'no-store'});
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        // Parse CSV: each line is an item, trim, ignore empty lines
        const lines = text.trim().split(/\r?\n/);
        items = lines.map(line => line.trim()).filter(line => line.length > 0);
        if (items.length === 0) throw new Error('No items found');
        numSlices = items.length;
        sliceAngle = 2 * Math.PI / numSlices;
        statusEl.textContent = `已載入 ${items.length} 項目`;
        drawWheel();
    } catch (err) {
        console.warn('Could not load food.csv:', err);
        statusEl.textContent = '載入失敗，使用內建預設清單';
        // fallback list
        items = [
            "鐵板燴飯",
            "名將三寶飯",
            "滷肉飯",
            "白河婆婆",
            "阪神花枝羹",
            "雞翅一百",
            "小么雞鹹水雞",
            "烤肉飯"
        ];
        numSlices = items.length;
        sliceAngle = 2 * Math.PI / numSlices;
        drawWheel();
    }
}

function drawWheel() {
    ctx.clearRect(0,0,diameter,diameter);
    for (let i = 0; i < numSlices; i++) {
        const angle = startAngle + i * sliceAngle;
        ctx.fillStyle = i % 2 === 0 ? '#ffb3ba' : '#ffdfba';
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
        ctx.lineTo(centerX, centerY);
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.stroke();

        // Text
        ctx.save();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 18px sans-serif';
        ctx.translate(centerX, centerY);
        ctx.rotate(angle + sliceAngle / 2);
        ctx.textAlign = 'right';
        ctx.fillText(items[i], radius - 10, 10);
        ctx.restore();
    }
    // Draw pointer
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(centerX - 5, centerY - radius - 10);
    ctx.lineTo(centerX + 5, centerY - radius - 10);
    ctx.lineTo(centerX, centerY - radius + 5);
    ctx.fill();
}

function spin() {
    if (numSlices === 0) {
        document.getElementById('result').innerText = '尚未載入餐點，請稍候…';
        return;
    }
    spinAngleStart = Math.random() * 2 * Math.PI;
    spinTime = 0;
    const spinTimeTotal = Math.random() * 3000 + 4000; // 4-7秒
    requestAnimationFrame(() => rotateWheel(spinTimeTotal));
}

function rotateWheel(spinTimeTotal) {
    spinTime += 30;
    if (spinTime >= spinTimeTotal) {
        stopSpin();
        return;
    }
    const angle = spinAngleStart + easeOut(spinTime, 0, 2*Math.PI * 10, spinTimeTotal);
    startAngle = angle;
    drawWheel();
    requestAnimationFrame(() => rotateWheel(spinTimeTotal));
}

function easeOut(t, b, c, d) {
    const ts = (t/=d)*t;
    const tc = ts*t;
    return b + c*(tc + -3*ts + 3*t);
}

function stopSpin() {
    const angle = Math.round((startAngle * -1 / (2*Math.PI)) % 1 * numSlices);
    const winningIndex = (numSlices - angle + numSlices) % numSlices;
    const winningText = items[winningIndex];
    document.getElementById('result').innerText = `恭喜！您抽到：${winningText}`;
    document.getElementById('result').style.color = '#27ae60';
}

// Initial load
loadCSV();
document.getElementById('spinBtn').addEventListener('click', spin);
</script>
</body>
</html>
